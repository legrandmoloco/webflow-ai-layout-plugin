<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Layout Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
        }

        .ai-layout-panel {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            max-width: 400px;
            margin: 0 auto;
        }

        .panel-header {
            background: #6366f1;
            color: white;
            padding: 16px;
            text-align: center;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .panel-content {
            padding: 20px;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 16px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .tab-button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: #f9fafb;
            color: #6b7280;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-button.active {
            background: #6366f1;
            color: white;
        }

        .input-area {
            display: none;
            margin-bottom: 16px;
        }

        .input-area.active {
            display: block;
        }

        .input-area label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-area textarea,
        .input-area input[type="text"],
        .input-area input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .generate-button {
            width: 100%;
            padding: 12px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .generate-button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .status-section {
            margin-top: 16px;
            min-height: 24px;
        }

        .loading { color: #6366f1; font-size: 14px; font-weight: 500; }
        .success { color: #10b981; font-size: 14px; font-weight: 500; }
        .error { color: #ef4444; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="ai-layout-panel">
        <div class="panel-header">
            <h3>AI Layout Generator (ChatGPT)</h3>
        </div>
        <div class="panel-content">
            <div class="input-section">
                <div class="tab-buttons">
                    <button id="prompt-tab" class="tab-button active">Text Prompt</button>
                    <button id="screenshot-tab" class="tab-button">Screenshot</button>
                </div>

                <div id="prompt-input" class="input-area active">
                    <label for="layout-prompt">Describe your layout:</label>
                    <textarea id="layout-prompt" placeholder="E.g., Create a hero section with a large heading, subtitle, and call-to-action button" rows="4"></textarea>
                </div>

                <div id="screenshot-input" class="input-area">
                    <label for="screenshot-file">Upload screenshot:</label>
                    <input type="file" id="screenshot-file" accept="image/*" />
                    <div id="screenshot-preview"></div>
                </div>

                <div style="margin: 16px 0; padding: 16px; background: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb;">
                    <label for="openai-api-key">OpenAI API Key:</label>
                    <input type="password" id="openai-api-key" placeholder="Your OpenAI API key (sk-...)" style="margin-top: 6px;"/>
                    <small style="display: block; font-size: 12px; color: #6b7280; margin-top: 6px;">Get your API key from <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></small>
                </div>

                <button id="generate-layout" class="generate-button" disabled>Generate Layout</button>
            </div>

            <div id="status" class="status-section"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Simple plugin implementation that works in iframe
        class SimpleAIPlugin {
            constructor() {
                this.screenshotData = null;
                this.init();
            }

            init() {
                console.log('Initializing simple AI plugin...');
                this.setupEventListeners();

                // Load saved API key
                const savedApiKey = localStorage.getItem('openai-api-key');
                if (savedApiKey) {
                    document.getElementById('openai-api-key').value = savedApiKey;
                    this.updateGenerateButton();
                }
            }

            setupEventListeners() {
                const promptTab = document.getElementById('prompt-tab');
                const screenshotTab = document.getElementById('screenshot-tab');
                const promptInput = document.getElementById('prompt-input');
                const screenshotInput = document.getElementById('screenshot-input');
                const generateButton = document.getElementById('generate-layout');
                const apiKeyInput = document.getElementById('openai-api-key');
                const layoutPrompt = document.getElementById('layout-prompt');
                const screenshotFile = document.getElementById('screenshot-file');

                promptTab.addEventListener('click', () => {
                    promptTab.classList.add('active');
                    screenshotTab.classList.remove('active');
                    promptInput.classList.add('active');
                    screenshotInput.classList.remove('active');
                    this.updateGenerateButton();
                });

                screenshotTab.addEventListener('click', () => {
                    screenshotTab.classList.add('active');
                    promptTab.classList.remove('active');
                    screenshotInput.classList.add('active');
                    promptInput.classList.remove('active');
                    this.updateGenerateButton();
                });

                apiKeyInput.addEventListener('input', () => {
                    localStorage.setItem('openai-api-key', apiKeyInput.value);
                    this.updateGenerateButton();
                });

                layoutPrompt.addEventListener('input', () => {
                    this.updateGenerateButton();
                });

                screenshotFile.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.handleScreenshotUpload(file);
                    } else {
                        this.screenshotData = null;
                        document.getElementById('screenshot-preview').innerHTML = '';
                    }
                    this.updateGenerateButton();
                });

                generateButton.addEventListener('click', () => {
                    this.generateLayout();
                });
            }

            updateGenerateButton() {
                const generateButton = document.getElementById('generate-layout');
                const apiKey = document.getElementById('openai-api-key').value;
                const hasPrompt = document.getElementById('layout-prompt').value.trim();
                const hasScreenshot = this.screenshotData !== null;
                const promptTab = document.getElementById('prompt-tab').classList.contains('active');

                // Debug logging
                console.log('Button update check:', {
                    apiKey: apiKey ? `${apiKey.substring(0, 10)}...` : 'empty',
                    hasPrompt,
                    hasScreenshot,
                    promptTab,
                    screenshotData: this.screenshotData ? 'exists' : 'null'
                });

                // Validate API key format (OpenAI keys start with sk-)
                const isValidKey = apiKey.startsWith('sk-') && apiKey.length > 20;
                const status = document.getElementById('status');

                if (apiKey && !isValidKey) {
                    status.innerHTML = '<div class="error">Invalid API key format. Should start with "sk-"</div>';
                } else if (isValidKey && ((promptTab && hasPrompt) || (!promptTab && hasScreenshot))) {
                    status.innerHTML = '';
                }

                const canGenerate = isValidKey && ((promptTab && hasPrompt) || (!promptTab && hasScreenshot));
                console.log('Can generate:', canGenerate, 'Valid key:', isValidKey);
                generateButton.disabled = !canGenerate;
            }

            handleScreenshotUpload(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('screenshot-preview');
                    preview.innerHTML = `
                        <img src="${e.target.result}" alt="Screenshot preview" style="max-width: 100%; height: auto; border-radius: 4px; margin-top: 8px;">
                    `;
                    this.screenshotData = e.target.result;
                    console.log('Screenshot uploaded and stored');
                    // Update button after screenshot is loaded
                    this.updateGenerateButton();
                };
                reader.readAsDataURL(file);
            }

            async generateLayout() {
                const status = document.getElementById('status');
                const generateButton = document.getElementById('generate-layout');

                try {
                    generateButton.disabled = true;
                    status.innerHTML = '<div class="loading">Generating layout...</div>';

                    const apiKey = document.getElementById('openai-api-key').value;
                    const promptTab = document.getElementById('prompt-tab').classList.contains('active');

                    // Use proxy server to avoid CORS issues
                    const proxyUrl = window.location.hostname === 'localhost'
                        ? 'http://localhost:3001/api/openai'
                        : 'https://project-0w0hw.vercel.app/api/openai';

                    let messages = [{
                        role: 'system',
                        content: 'You are an expert web designer who creates modern, responsive layouts. Always respond with valid JSON containing "html" and "css" properties.'
                    }];

                    if (promptTab) {
                        // Text prompt mode
                        const prompt = document.getElementById('layout-prompt').value;
                        messages.push({
                            role: 'user',
                            content: `Create a modern webpage layout for: ${prompt}

Return your response as JSON with 'html' and 'css' properties containing:
- Clean, semantic HTML structure
- Modern CSS styles with flexbox/grid
- Responsive design principles
- Professional color scheme and typography

Example format:
{
  "html": "<div class='container'>...</div>",
  "css": ".container { ... }"
}`
                        });
                    } else {
                        // Screenshot mode - use vision model
                        if (!this.screenshotData) {
                            throw new Error('No screenshot uploaded');
                        }

                        // Extract base64 data and mime type
                        const base64Data = this.screenshotData.split(',')[1];
                        const mimeType = this.screenshotData.split(';')[0].split(':')[1];

                        messages.push({
                            role: 'user',
                            content: [
                                {
                                    type: 'text',
                                    text: `Analyze this screenshot and create a similar modern webpage layout. Return your response as JSON with 'html' and 'css' properties containing:
- Clean, semantic HTML structure that recreates the design
- Modern CSS styles with flexbox/grid
- Responsive design principles
- Professional color scheme and typography similar to the image

Example format:
{
  "html": "<div class='container'>...</div>",
  "css": ".container { ... }"
}`
                                },
                                {
                                    type: 'image_url',
                                    image_url: {
                                        url: this.screenshotData
                                    }
                                }
                            ]
                        });
                    }

                    const requestData = {
                        apiKey: apiKey,
                        model: promptTab ? 'gpt-4' : 'gpt-4o',
                        max_tokens: 4000,
                        messages: messages
                    };

                    const response = await axios.post(proxyUrl, requestData);

                    status.innerHTML = '<div class="success">Layout generated! Check console for output.</div>';

                    // Parse response
                    let generatedContent = response.data.choices[0].message.content;
                    console.log('Raw response:', generatedContent);

                    // Try to parse JSON from response
                    try {
                        const jsonMatch = generatedContent.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            const layoutData = JSON.parse(jsonMatch[0]);
                            console.log('Parsed layout data:', layoutData);

                            // Create elements in Webflow
                            await this.createWebflowLayout(layoutData);
                            status.innerHTML = '<div class="success">✅ Layout created in Webflow!</div>';
                        } else {
                            console.log('No JSON found in response');
                            // Try to create from raw HTML if no JSON
                            await this.createFromRawHTML(generatedContent);
                            status.innerHTML = '<div class="success">✅ Layout created from raw HTML!</div>';
                        }
                    } catch (parseError) {
                        console.log('Could not parse JSON, trying raw content:', generatedContent);
                        // Fallback to raw content
                        await this.createFromRawHTML(generatedContent);
                        status.innerHTML = '<div class="success">✅ Layout created from raw content!</div>';
                    }

                } catch (error) {
                    status.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    console.error('Generation error:', error);
                } finally {
                    generateButton.disabled = false;
                    this.updateGenerateButton();
                }
            }

            async createWebflowLayout(layoutData) {
                console.log('Creating Webflow layout:', layoutData);

                try {
                    // Enhanced debugging - check what's available in the global scope
                    console.log('🔍 Debug - Available globals:', Object.keys(window).filter(key => key.toLowerCase().includes('web') || key.toLowerCase().includes('flow')));
                    console.log('🔍 Debug - webflow type:', typeof webflow);
                    console.log('🔍 Debug - window.webflow type:', typeof window.webflow);
                    console.log('🔍 Debug - Current domain:', window.location.hostname);
                    console.log('🔍 Debug - User agent:', navigator.userAgent.substring(0, 100));

                    if (typeof webflow !== 'undefined') {
                        console.log('✅ Webflow object found:', webflow);
                        console.log('✅ Webflow methods available:', Object.keys(webflow));
                        console.log('✅ elementBuilder available:', typeof webflow.elementBuilder);
                        console.log('✅ elementPresets available:', typeof webflow.elementPresets);
                        if (webflow.elementPresets) {
                            console.log('✅ Available presets:', Object.keys(webflow.elementPresets));
                        }
                    }

                    // Check if webflow API is available
                    if (typeof webflow === 'undefined') {
                        console.error('❌ Webflow API not available');
                        console.log('📍 Current environment check:');
                        console.log('  - hostname:', window.location.hostname);
                        console.log('  - protocol:', window.location.protocol);
                        console.log('  - pathname:', window.location.pathname);
                        console.log('  - in iframe:', window.self !== window.top);

                        // For development/testing mode (when Webflow API is not available)
                        const isInWebflowIframe = window.parent !== window;
                        const isWebflowDomain = window.location.hostname.includes('vercel.app') || window.location.hostname === 'localhost';

                        if (isWebflowDomain) {
                            console.log('🚀 Running in development mode - showing preview instead of creating actual elements');
                            console.log('💡 To create actual Webflow elements, upload this plugin to Webflow and run in production mode');
                            this.createMockLayout(layoutData.html || 'Generated content preview');
                            return;
                        }

                        throw new Error('Webflow API not available. Make sure you are running this in Webflow Designer.');
                    }

                    // Parse HTML and create elements
                    if (layoutData.html) {
                        await this.parseAndCreateElements(layoutData.html, layoutData.css);
                    } else {
                        throw new Error('No HTML found in layout data');
                    }

                } catch (error) {
                    console.error('Error creating Webflow layout:', error);
                    throw error;
                }
            }

            async parseAndCreateElements(htmlString, cssString) {
                try {
                    // Check if we have access to Webflow API
                    if (typeof webflow === 'undefined') {
                        console.warn('Webflow API not available, creating mock elements');
                        this.createMockLayout(htmlString);
                        return;
                    }

                    // Get current body element to add our content to
                    const bodyElement = await webflow.getBodyElement();
                    console.log('Got body element:', bodyElement);

                    // Create a container div using the correct Webflow API
                    const containerBuilder = webflow.elementBuilder(webflow.elementPresets.DivBlock);
                    const containerElement = await containerBuilder.build();

                    // Add container to body
                    await bodyElement.appendChild(containerElement);

                    // Set styles on container
                    await containerElement.setStyles({
                        'display': 'flex',
                        'flex-direction': 'column',
                        'width': '100%',
                        'min-height': '400px',
                        'padding': '20px',
                        'background-color': '#f8f9fa',
                        'border': '2px solid #007bff',
                        'border-radius': '8px',
                        'margin': '20px 0'
                    });

                    // Parse HTML to extract structure
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(`<div>${htmlString}</div>`, 'text/html');
                    const rootElement = doc.body.firstChild;

                    // Create Webflow elements from parsed HTML
                    await this.createWebflowElementsFromDOM(rootElement, containerElement);

                    // Apply CSS styles if provided
                    if (cssString) {
                        await this.applyCSSStyles(cssString);
                    }

                    console.log('✅ Layout created successfully in Webflow!');

                } catch (error) {
                    console.error('Error parsing and creating elements:', error);
                    throw error;
                }
            }

            async createWebflowElementsFromDOM(domElement, parentWebflowElement) {
                if (!domElement || domElement.nodeType !== Node.ELEMENT_NODE) {
                    return;
                }

                const tagName = domElement.tagName.toLowerCase();
                let webflowElement;

                try {
                    // Map HTML tags to Webflow elements using correct API
                    let builder;
                    switch (tagName) {
                        case 'header':
                        case 'nav':
                        case 'section':
                        case 'footer':
                        case 'div':
                            builder = webflow.elementBuilder(webflow.elementPresets.DivBlock);
                            break;
                        case 'h1':
                        case 'h2':
                        case 'h3':
                        case 'h4':
                        case 'h5':
                        case 'h6':
                            builder = webflow.elementBuilder(webflow.elementPresets.Heading);
                            break;
                        case 'p':
                            builder = webflow.elementBuilder(webflow.elementPresets.Paragraph);
                            break;
                        case 'a':
                            builder = webflow.elementBuilder(webflow.elementPresets.Link);
                            break;
                        case 'img':
                            builder = webflow.elementBuilder(webflow.elementPresets.Image);
                            break;
                        case 'button':
                            builder = webflow.elementBuilder(webflow.elementPresets.Button);
                            break;
                        default:
                            builder = webflow.elementBuilder(webflow.elementPresets.DivBlock);
                            break;
                    }

                    webflowElement = await builder.build();
                    await parentWebflowElement.appendChild(webflowElement);

                    // Set text content if element has text
                    if (domElement.textContent && domElement.children.length === 0) {
                        const textContent = domElement.textContent.trim();
                        if (textContent) {
                            await webflowElement.setTextContent(textContent);
                        }
                    }

                    // Apply basic styles based on tag
                    await this.applyBasicStyles(webflowElement, tagName, domElement);

                    // Recursively create child elements
                    for (const child of domElement.children) {
                        await this.createWebflowElementsFromDOM(child, webflowElement);
                    }

                } catch (error) {
                    console.error(`Error creating element for tag ${tagName}:`, error);
                    // Create a fallback div if specific element creation fails
                    try {
                        const fallbackBuilder = webflow.elementBuilder(webflow.elementPresets.DivBlock);
                        webflowElement = await fallbackBuilder.build();
                        await parentWebflowElement.appendChild(webflowElement);
                        if (domElement.textContent) {
                            await webflowElement.setTextContent(domElement.textContent.trim());
                        }
                    } catch (fallbackError) {
                        console.error('Even fallback element creation failed:', fallbackError);
                    }
                }
            }

            async applyBasicStyles(webflowElement, tagName, domElement) {
                try {
                    const styles = {};

                    // Apply basic styles based on element type
                    switch (tagName) {
                        case 'header':
                            styles['display'] = 'flex';
                            styles['justify-content'] = 'space-between';
                            styles['align-items'] = 'center';
                            styles['padding'] = '20px';
                            styles['background-color'] = '#ffffff';
                            styles['border-bottom'] = '1px solid #e5e5e5';
                            break;
                        case 'nav':
                            styles['display'] = 'flex';
                            styles['gap'] = '20px';
                            break;
                        case 'section':
                            styles['padding'] = '40px 20px';
                            styles['width'] = '100%';
                            break;
                        case 'h1':
                            styles['font-size'] = '48px';
                            styles['font-weight'] = 'bold';
                            styles['margin-bottom'] = '20px';
                            break;
                        case 'h2':
                            styles['font-size'] = '36px';
                            styles['font-weight'] = 'bold';
                            styles['margin-bottom'] = '16px';
                            break;
                        case 'h3':
                            styles['font-size'] = '24px';
                            styles['font-weight'] = 'bold';
                            styles['margin-bottom'] = '12px';
                            break;
                        case 'p':
                            styles['font-size'] = '16px';
                            styles['line-height'] = '1.6';
                            styles['margin-bottom'] = '16px';
                            break;
                        case 'button':
                            styles['padding'] = '12px 24px';
                            styles['background-color'] = '#007bff';
                            styles['color'] = '#ffffff';
                            styles['border'] = 'none';
                            styles['border-radius'] = '4px';
                            styles['cursor'] = 'pointer';
                            break;
                        case 'footer':
                            styles['margin-top'] = 'auto';
                            styles['padding'] = '40px 20px';
                            styles['background-color'] = '#f8f9fa';
                            styles['text-align'] = 'center';
                            break;
                    }

                    // Apply class-based styles if available
                    if (domElement.className) {
                        const classes = domElement.className.split(' ');
                        for (const className of classes) {
                            if (className.includes('hero')) {
                                styles['text-align'] = 'center';
                                styles['padding'] = '80px 20px';
                                styles['background-color'] = '#f8f9fa';
                            }
                            if (className.includes('container')) {
                                styles['max-width'] = '1200px';
                                styles['margin'] = '0 auto';
                            }
                        }
                    }

                    if (Object.keys(styles).length > 0) {
                        await webflowElement.setStyles(styles);
                    }

                } catch (error) {
                    console.warn('Error applying styles:', error);
                }
            }

            async applyCSSStyles(cssString) {
                try {
                    console.log('Applying CSS styles:', cssString.substring(0, 200) + '...');
                    // Note: Webflow doesn't support direct CSS injection
                    // This is a placeholder for future CSS parsing implementation
                } catch (error) {
                    console.warn('Error applying CSS styles:', error);
                }
            }

            createMockLayout(htmlString) {
                try {
                    console.log('Creating mock layout preview (Webflow API not available)');

                    // Create a visual representation in the plugin interface
                    const status = document.getElementById('status');

                    // Create a styled preview container
                    const previewContainer = document.createElement('div');
                    previewContainer.style.cssText = `
                        margin-top: 20px;
                        padding: 20px;
                        border: 2px solid #007bff;
                        border-radius: 8px;
                        background: #f8f9fa;
                        max-height: 400px;
                        overflow-y: auto;
                    `;

                    // Try to render the HTML if it's valid, otherwise show as code
                    try {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = htmlString;

                        // If HTML is valid, create a styled preview
                        previewContainer.innerHTML = `
                            <h4 style="margin: 0 0 15px 0; color: #007bff; font-size: 16px;">🎨 Generated Layout Preview:</h4>
                            <div style="border: 1px solid #ccc; padding: 15px; background: white; border-radius: 4px; margin-bottom: 15px;">
                                ${htmlString}
                            </div>
                            <details style="margin-top: 10px;">
                                <summary style="cursor: pointer; color: #666; font-size: 14px;">View HTML Code</summary>
                                <pre style="background: #f1f1f1; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 8px; white-space: pre-wrap;">${htmlString}</pre>
                            </details>
                        `;
                    } catch (e) {
                        // Fallback to code display if HTML is malformed
                        previewContainer.innerHTML = `
                            <h4 style="margin: 0 0 15px 0; color: #007bff;">Generated Content:</h4>
                            <pre style="background: #f1f1f1; padding: 15px; border-radius: 4px; font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow-y: auto;">${htmlString}</pre>
                        `;
                    }

                    status.innerHTML = `
                        <div class="success" style="text-align: left;">
                            ✅ Layout generated successfully!
                            <div style="margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 4px; font-size: 14px; color: #1565c0;">
                                <strong>🔧 Development Preview Mode</strong><br>
                                This is a preview of the generated layout. To create actual Webflow elements:<br>
                                <strong>1.</strong> Copy the files from the <code>dist/</code> folder<br>
                                <strong>2.</strong> Upload them to your Webflow app in production<br>
                                <strong>3.</strong> The Webflow API will then be available for element creation
                            </div>
                        </div>
                    `;

                    status.appendChild(previewContainer);

                } catch (error) {
                    console.error('Error creating mock layout:', error);
                    const status = document.getElementById('status');
                    status.innerHTML = `
                        <div class="error">
                            Error creating preview: ${error.message}
                        </div>
                    `;
                }
            }

            async createFromRawHTML(content) {
                try {
                    // Extract HTML from markdown code blocks or raw content
                    let htmlMatch = content.match(/```html\n([\s\S]*?)\n```/);
                    if (!htmlMatch) {
                        htmlMatch = content.match(/<[^>]+>[\s\S]*<\/[^>]+>/);
                    }

                    if (htmlMatch) {
                        const htmlContent = htmlMatch[1] || htmlMatch[0];
                        await this.parseAndCreateElements(htmlContent, '');
                    } else {
                        // Create a simple text element with the content
                        const bodyElement = await webflow.getBodyElement();
                        const textBuilder = webflow.elementBuilder(webflow.elementPresets.Paragraph);
                        const textElement = await textBuilder.build();
                        await bodyElement.appendChild(textElement);
                        await textElement.setTextContent('AI Generated Content: ' + content.substring(0, 200) + '...');
                    }

                } catch (error) {
                    console.error('Error creating from raw HTML:', error);
                    throw error;
                }
            }
        }

        // Create a proxy webflow object that communicates with parent frame via postMessage
        function createWebflowProxy() {
            console.log('🔧 Creating Webflow proxy for iframe communication...');

            let messageId = 0;
            const pendingMessages = new Map();

            // Listen for responses from parent frame
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'webflow-response') {
                    const { id, result, error } = event.data;
                    if (pendingMessages.has(id)) {
                        const { resolve, reject } = pendingMessages.get(id);
                        pendingMessages.delete(id);

                        if (error) {
                            reject(new Error(error));
                        } else {
                            resolve(result);
                        }
                    }
                }
            });

            // Send message to parent frame and wait for response
            function sendMessage(method, args = []) {
                return new Promise((resolve, reject) => {
                    const id = ++messageId;
                    const timeout = setTimeout(() => {
                        pendingMessages.delete(id);
                        reject(new Error(`Webflow API call timeout: ${method}`));
                    }, 10000);

                    pendingMessages.set(id, { resolve, reject });

                    const message = {
                        type: 'webflow-api-call',
                        id,
                        method,
                        args
                    };

                    console.log('📡 Sending webflow API call:', message);
                    window.parent.postMessage(message, '*');
                });
            }

            // Create proxy object with common Webflow API methods
            return {
                // Element creation methods
                getBodyElement: () => sendMessage('getBodyElement'),

                elementBuilder: (preset) => ({
                    build: () => sendMessage('elementBuilder.build', [preset])
                }),

                elementPresets: {
                    DivBlock: 'DivBlock',
                    Section: 'Section',
                    Heading: 'Heading',
                    Paragraph: 'Paragraph',
                    Link: 'Link',
                    Image: 'Image',
                    Button: 'Button',
                    Form: 'Form',
                    Input: 'Input',
                    Textarea: 'Textarea',
                    List: 'List',
                    ListItem: 'ListItem'
                },

                // Utility methods
                getCurrentPage: () => sendMessage('getCurrentPage'),
                selectElement: (element) => sendMessage('selectElement', [element])
            };
        }

        // Webflow plugin initialization - try multiple methods
        function initializePlugin() {
            console.log('🚀 Initializing plugin...');

            // Debug current environment (safe cross-origin checks)
            console.log('🔍 Environment debug:');
            console.log('  - window.webflow:', typeof window.webflow);
            console.log('  - in iframe:', window.parent !== window);
            console.log('  - referrer:', document.referrer);
            console.log('  - location:', window.location.href);
            console.log('  - user agent contains Webflow:', navigator.userAgent.includes('Webflow'));
            console.log('  - available globals:', Object.keys(window).filter(k => k.toLowerCase().includes('web')));

            // Note: Webflow API is only available when plugin is installed in production
            if (!window.webflow && window.parent !== window) {
                console.log('📌 Running in iframe without Webflow API - using preview mode');
            }

            new SimpleAIPlugin();
        }

        // Try multiple initialization approaches

        // Method 1: Standard webflow.ready() callback
        if (typeof webflow !== 'undefined' && webflow.ready) {
            console.log('📡 Using webflow.ready() callback');
            webflow.ready(() => {
                console.log('✅ webflow.ready() fired');
                initializePlugin();
            });
        }
        // Method 2: Wait for DOM + manual check
        else {
            console.log('📄 Using DOM + manual Webflow check');
            document.addEventListener('DOMContentLoaded', () => {
                console.log('📄 DOM loaded');

                // Try immediate initialization
                if (typeof webflow !== 'undefined') {
                    console.log('✅ Webflow found immediately');
                    initializePlugin();
                    return;
                }

                // Wait with polling
                console.log('🔄 Polling for Webflow API...');
                let attempts = 0;
                const maxAttempts = 50; // 5 seconds timeout

                const checkWebflow = () => {
                    attempts++;
                    console.log(`🔍 Attempt ${attempts}/${maxAttempts} - webflow:`, typeof window.webflow);

                    if (typeof window.webflow !== 'undefined') {
                        console.log('✅ Webflow API found!');
                        initializePlugin();
                    } else if (attempts >= maxAttempts) {
                        console.log('⏰ Timeout - initializing without Webflow API');
                        initializePlugin();
                    } else {
                        setTimeout(checkWebflow, 100);
                    }
                };

                checkWebflow();
            });
        }

        // Method 3: Fallback - initialize immediately if webflow is already available
        if (typeof webflow !== 'undefined') {
            console.log('⚡ Webflow already available, initializing immediately');
            initializePlugin();
        }
    </script>
